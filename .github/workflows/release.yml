name: Build and Publish

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - Cargo.toml
      - pyproject.toml

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_publish: ${{ steps.pipeline.outputs.should_publish }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve version change
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python <<'PY'
          import os
          import subprocess
          import sys
          import tomllib
          from pathlib import Path


          def versions_from_text(cargo_text: str, pyproject_text: str) -> tuple[str, str]:
              """Read package versions from the two project metadata files."""
              cargo_version = tomllib.loads(cargo_text)["package"]["version"]
              pyproject_version = tomllib.loads(pyproject_text)["project"]["version"]
              return cargo_version, pyproject_version


          def file_at_ref(ref: str, path: str) -> str | None:
              """Return a tracked file at a git ref, or None when the ref/path is unavailable."""
              if not ref or set(ref) == {"0"}:
                  return None
              try:
                  return subprocess.check_output(
                      ["git", "show", f"{ref}:{path}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
              except subprocess.CalledProcessError:
                  return None


          def set_output(name: str, value: str) -> None:
              """Append one GitHub Actions step output value."""
              with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output_file:
                  print(f"{name}={value}", file=output_file)


          cargo_text = Path("Cargo.toml").read_text(encoding="utf-8")
          pyproject_text = Path("pyproject.toml").read_text(encoding="utf-8")
          cargo_version, pyproject_version = versions_from_text(cargo_text, pyproject_text)

          if cargo_version != pyproject_version:
              print(
                  f"Cargo.toml version {cargo_version} does not match "
                  f"pyproject.toml version {pyproject_version}",
                  file=sys.stderr,
              )
              sys.exit(1)

          event_name = os.environ["EVENT_NAME"]
          release_tag = os.environ.get("RELEASE_TAG", "")
          version = cargo_version
          tag = f"v{version}"
          changed = "false"

          if event_name == "release":
              tag = release_tag
              version = release_tag.removeprefix("v")
              if version != cargo_version:
                  print(
                      f"Release tag {release_tag} does not match package version {cargo_version}",
                      file=sys.stderr,
                  )
                  sys.exit(1)
              changed = "true"
          else:
              previous_cargo_text = file_at_ref(os.environ.get("BEFORE_SHA", ""), "Cargo.toml")
              previous_pyproject_text = file_at_ref(os.environ.get("BEFORE_SHA", ""), "pyproject.toml")
              if previous_cargo_text is None or previous_pyproject_text is None:
                  changed = "true"
              else:
                  previous_cargo_version, previous_pyproject_version = versions_from_text(
                      previous_cargo_text,
                      previous_pyproject_text,
                  )
                  changed = str(
                      (previous_cargo_version, previous_pyproject_version)
                      != (cargo_version, pyproject_version)
                  ).lower()

          set_output("changed", changed)
          set_output("tag", tag)
          set_output("version", version)
          print(f"Resolved {tag}; version_changed={changed}")
          PY

      - name: Create GitHub release
        id: auto_release
        if: github.event_name == 'push' && steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" >/dev/null 2>&1 || true
            release_sha="$(git rev-list -n 1 "${RELEASE_TAG}" 2>/dev/null || true)"
            if [ "${release_sha}" != "${GITHUB_SHA}" ]; then
              echo "Release ${RELEASE_TAG} already exists at ${release_sha:-unknown}, not ${GITHUB_SHA}." >&2
              exit 1
            fi
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Release ${RELEASE_TAG} already exists on this commit; continue publish pipeline."
            exit 0
          fi

          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" >/dev/null 2>&1 || true
          existing_tag_sha="$(git rev-list -n 1 "${RELEASE_TAG}" 2>/dev/null || true)"
          if [ -n "${existing_tag_sha}" ] && [ "${existing_tag_sha}" != "${GITHUB_SHA}" ]; then
            echo "Tag ${RELEASE_TAG} already exists at ${existing_tag_sha}, not ${GITHUB_SHA}." >&2
            exit 1
          fi

          gh release create "${RELEASE_TAG}" \
            --target "${GITHUB_SHA}" \
            --title "${RELEASE_TAG}" \
            --notes "Automated release for moviepilot-rust ${RELEASE_VERSION}."
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Select release pipeline
        id: pipeline
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.auto_release.outputs.publish }}" = "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: ${{ matrix.conf.os }}-${{ matrix.conf.target }}-${{ matrix.conf.manylinux || 'host' }}
    needs: prepare-release
    if: needs.prepare-release.outputs.should_publish == 'true'
    runs-on: ${{ matrix.conf.os }}
    strategy:
      fail-fast: false
      matrix:
        conf:
          - {
              os: ubuntu-latest,
              target: x86_64,
              target-triple: x86_64-unknown-linux-gnu,
              manylinux: 2014,
            }
          - {
              os: ubuntu-latest,
              target: aarch64,
              target-triple: aarch64-unknown-linux-gnu,
              manylinux: 2014,
            }
          - {
              os: ubuntu-latest,
              target: x86_64,
              target-triple: x86_64-unknown-linux-musl,
              manylinux: musllinux_1_1,
            }
          - {
              os: ubuntu-latest,
              target: aarch64,
              target-triple: aarch64-unknown-linux-musl,
              manylinux: musllinux_1_1,
            }
          - {
              os: macos-14,
              target: x86_64,
              target-triple: x86_64-apple-darwin,
              manylinux: "",
            }
          - {
              os: macos-14,
              target: aarch64,
              target-triple: aarch64-apple-darwin,
              manylinux: "",
            }
          - {
              os: windows-latest,
              target: x86_64,
              target-triple: x86_64-pc-windows-msvc,
              manylinux: "",
            }
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.conf.target-triple }}

      - name: Setup QEMU (Linux cross)
        if: matrix.conf.os == 'ubuntu-latest' && matrix.conf.target != 'x86_64'
        uses: docker/setup-qemu-action@v4

      - name: Build wheel (Linux)
        if: matrix.conf.manylinux != ''
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          target: ${{ matrix.conf.target }}
          manylinux: ${{ matrix.conf.manylinux }}
          docker-options: -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
          args: -i python3.11 --release --out dist --compatibility pypi

      - name: Build wheel (macOS)
        if: matrix.conf.manylinux == '' && runner.os != 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.conf.target }}
          args: -i python3.11 --release --out dist --compatibility pypi
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          pip install maturin
          maturin build -i python --release -o dist --target ${{ matrix.conf.target-triple }} --compatibility pypi

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.conf.os }}-${{ matrix.conf.target }}-${{ matrix.conf.manylinux || 'host' }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [prepare-release, build]
    if: needs.prepare-release.outputs.should_publish == 'true'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  bump-moviepilot-requirements:
    name: Bump MoviePilot requirements.in
    runs-on: ubuntu-latest
    needs: [prepare-release, publish]
    if: needs.prepare-release.outputs.should_publish == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          repository: jxxghp/MoviePilot
          ref: v2
          token: ${{ secrets.MOVIEPILOT_REPO_TOKEN }}

      - name: Update moviepilot-rust pin
        id: bump
        run: |
          target="moviepilot-rust~=${{ needs.prepare-release.outputs.version }}"
          if grep -q "^${target}$" requirements.in; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already pinned to ${target}"
            exit 0
          fi
          if ! grep -q '^moviepilot-rust~=' requirements.in; then
            echo "moviepilot-rust entry not found in requirements.in" >&2
            exit 1
          fi
          sed -i "s/^moviepilot-rust~=.*$/${target}/" requirements.in
          echo "changed=true" >> "$GITHUB_OUTPUT"
          grep '^moviepilot-rust~=' requirements.in

      - uses: peter-evans/create-pull-request@v7
        if: steps.bump.outputs.changed == 'true'
        with:
          token: ${{ secrets.MOVIEPILOT_REPO_TOKEN }}
          commit-message: "chore: bump moviepilot-rust to ${{ needs.prepare-release.outputs.version }}"
          title: "chore: bump moviepilot-rust to ${{ needs.prepare-release.outputs.version }}"
          body: |
            Automated bump from [${{ github.repository }}](https://github.com/${{ github.repository }}) release ${{ needs.prepare-release.outputs.tag }}.

            PyPI: https://pypi.org/project/moviepilot-rust/${{ needs.prepare-release.outputs.version }}/
          branch: chore/bump-moviepilot-rust-${{ needs.prepare-release.outputs.version }}
          base: v2
          delete-branch: true
