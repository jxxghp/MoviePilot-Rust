name: Build and Publish

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'

permissions:
  contents: read

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.context.outputs.should_publish }}
      version: ${{ steps.context.outputs.version }}
      tag: ${{ steps.context.outputs.tag }}
      target_sha: ${{ steps.context.outputs.target_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release context
        id: context
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ -z "${version}" ]; then
            echo "Unable to resolve Cargo package version" >&2
            exit 1
          fi

          tag="v${version}"
          target_sha="${CURRENT_SHA}"
          should_publish="true"

          if [ "${EVENT_NAME}" = "release" ]; then
            tag="${RELEASE_TAG}"
            if [ -z "${tag}" ]; then
              echo "Unable to resolve release tag" >&2
              exit 1
            fi
            if [ "${tag}" != "v${version}" ]; then
              echo "Release tag ${tag} does not match Cargo package version v${version}" >&2
              exit 1
            fi
          elif [ "${EVENT_NAME}" = "push" ]; then
            should_publish="false"
            if [ -z "${BEFORE_SHA}" ] || printf '%s' "${BEFORE_SHA}" | grep -q '^0\+$'; then
              echo "Unable to compare Cargo package version for this push; skipping automatic release."
            else
              previous_version="$(git show "${BEFORE_SHA}:Cargo.toml" | sed -n 's/^version = "\([^"]*\)"/\1/p' | head -n 1 || true)"
              if [ -z "${previous_version}" ]; then
                echo "Unable to resolve previous Cargo package version" >&2
                exit 1
              fi

              if [ "${previous_version}" = "${version}" ]; then
                echo "Cargo package version is unchanged (${version}); skipping automatic release."
              elif git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
                echo "Tag ${tag} already exists; skipping automatic release."
              else
                echo "Cargo package version changed from ${previous_version} to ${version}; publishing ${tag}."
                should_publish="true"
              fi
            fi
          fi

          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "target_sha=${target_sha}" >> "$GITHUB_OUTPUT"

  auto-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event_name == 'push' && needs.prepare.outputs.should_publish == 'true'
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
          TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
        run: |
          gh release create "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${TARGET_SHA}" \
            --title "${TAG_NAME}" \
            --generate-notes

  build:
    name: ${{ matrix.conf.os }}-${{ matrix.conf.target }}-${{ matrix.conf.manylinux || 'host' }}
    runs-on: ${{ matrix.conf.os }}
    needs:
      - prepare
      - auto-release
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.should_publish == 'true' &&
      (needs.auto-release.result == 'success' || needs.auto-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        conf:
          - {
              os: ubuntu-latest,
              target: x86_64,
              target-triple: x86_64-unknown-linux-gnu,
              manylinux: 2014,
            }
          - {
              os: ubuntu-latest,
              target: aarch64,
              target-triple: aarch64-unknown-linux-gnu,
              manylinux: 2014,
            }
          - {
              os: ubuntu-latest,
              target: x86_64,
              target-triple: x86_64-unknown-linux-musl,
              manylinux: musllinux_1_1,
            }
          - {
              os: ubuntu-latest,
              target: aarch64,
              target-triple: aarch64-unknown-linux-musl,
              manylinux: musllinux_1_1,
            }
          - {
              os: macos-14,
              target: x86_64,
              target-triple: x86_64-apple-darwin,
              manylinux: "",
            }
          - {
              os: macos-14,
              target: aarch64,
              target-triple: aarch64-apple-darwin,
              manylinux: "",
            }
          - {
              os: windows-latest,
              target: x86_64,
              target-triple: x86_64-pc-windows-msvc,
              manylinux: "",
            }
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.conf.target-triple }}

      - name: Setup QEMU (Linux cross)
        if: matrix.conf.os == 'ubuntu-latest' && matrix.conf.target != 'x86_64'
        uses: docker/setup-qemu-action@v4

      - name: Build wheel (Linux)
        if: matrix.conf.manylinux != ''
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          target: ${{ matrix.conf.target }}
          manylinux: ${{ matrix.conf.manylinux }}
          docker-options: -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
          args: -i python3.11 --release --out dist --compatibility pypi

      - name: Build wheel (macOS)
        if: matrix.conf.manylinux == '' && runner.os != 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.conf.target }}
          args: -i python3.11 --release --out dist --compatibility pypi
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          pip install maturin
          maturin build -i python --release -o dist --target ${{ matrix.conf.target-triple }} --compatibility pypi

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.conf.os }}-${{ matrix.conf.target }}-${{ matrix.conf.manylinux || 'host' }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  bump-moviepilot-requirements:
    name: Bump MoviePilot requirements.in
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish
    steps:
      - uses: actions/checkout@v6
        with:
          repository: jxxghp/MoviePilot
          ref: v2
          token: ${{ secrets.MOVIEPILOT_REPO_TOKEN }}
          path: moviepilot

      - name: Update moviepilot-rust pin
        id: bump
        working-directory: moviepilot
        run: |
          target="moviepilot-rust~=${{ needs.prepare.outputs.version }}"
          if grep -q "^${target}$" requirements.in; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already pinned to ${target}"
            exit 0
          fi
          if ! grep -q '^moviepilot-rust~=' requirements.in; then
            echo "moviepilot-rust entry not found in requirements.in" >&2
            exit 1
          fi
          sed -i "s/^moviepilot-rust~=.*$/${target}/" requirements.in
          echo "changed=true" >> "$GITHUB_OUTPUT"
          grep '^moviepilot-rust~=' requirements.in

      - uses: peter-evans/create-pull-request@v7
        if: steps.bump.outputs.changed == 'true'
        with:
          path: moviepilot
          token: ${{ secrets.MOVIEPILOT_REPO_TOKEN }}
          commit-message: "chore: bump moviepilot-rust to ${{ needs.prepare.outputs.version }}"
          title: "chore: bump moviepilot-rust to ${{ needs.prepare.outputs.version }}"
          body: |
            Automated bump from [${{ github.repository }}](https://github.com/${{ github.repository }}) release ${{ needs.prepare.outputs.tag }}.

            PyPI: https://pypi.org/project/moviepilot-rust/${{ needs.prepare.outputs.version }}/
          branch: chore/bump-moviepilot-rust-${{ needs.prepare.outputs.version }}
          base: v2
          delete-branch: true
