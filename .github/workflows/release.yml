name: Build and Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.conf.os }}-${{ matrix.conf.target }}-${{ matrix.conf.manylinux || 'host' }}
    runs-on: ${{ matrix.conf.os }}
    strategy:
      fail-fast: false
      matrix:
        conf:
          - {
              os: ubuntu-latest,
              target: x86_64,
              target-triple: x86_64-unknown-linux-gnu,
              manylinux: 2014,
            }
          - {
              os: ubuntu-latest,
              target: aarch64,
              target-triple: aarch64-unknown-linux-gnu,
              manylinux: 2014,
            }
          - {
              os: ubuntu-latest,
              target: x86_64,
              target-triple: x86_64-unknown-linux-musl,
              manylinux: musllinux_1_1,
            }
          - {
              os: ubuntu-latest,
              target: aarch64,
              target-triple: aarch64-unknown-linux-musl,
              manylinux: musllinux_1_1,
            }
          - {
              os: macos-14,
              target: x86_64,
              target-triple: x86_64-apple-darwin,
              manylinux: "",
            }
          - {
              os: macos-14,
              target: aarch64,
              target-triple: aarch64-apple-darwin,
              manylinux: "",
            }
          - {
              os: windows-latest,
              target: x86_64,
              target-triple: x86_64-pc-windows-msvc,
              manylinux: "",
            }
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.conf.target-triple }}

      - name: Setup QEMU (Linux cross)
        if: matrix.conf.os == 'ubuntu-latest' && matrix.conf.target != 'x86_64'
        uses: docker/setup-qemu-action@v4

      - name: Build wheel (Linux)
        if: matrix.conf.manylinux != ''
        uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          target: ${{ matrix.conf.target }}
          manylinux: ${{ matrix.conf.manylinux }}
          docker-options: -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
          args: -i python3.11 --release --out dist --compatibility pypi

      - name: Build wheel (macOS)
        if: matrix.conf.manylinux == '' && runner.os != 'Windows'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.conf.target }}
          args: -i python3.11 --release --out dist --compatibility pypi
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          pip install maturin
          maturin build -i python --release -o dist --target ${{ matrix.conf.target-triple }} --compatibility pypi

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.conf.os }}-${{ matrix.conf.target }}-${{ matrix.conf.manylinux || 'host' }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Validate wheels
        run: |
          shopt -s globstar nullglob
          wheels=(dist/**/*.whl dist/*.whl)
          if (( ${#wheels[@]} == 0 )); then
            echo "No wheels found in dist/" >&2
            exit 1
          fi
          python3 -m zipfile -t "${wheels[@]}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
